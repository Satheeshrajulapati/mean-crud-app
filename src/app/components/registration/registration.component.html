<div class="row pt-5">
  <div class="col-md-6 mx-auto">
    <div class="card rounded-0">
      <div class="card-header" style="background-color: red;">
        <h3>Register</h3>
      </div>
      <div class="card-body">
        <form class="form">
          <div class="form-group">
            <p>
              <mat-form-field color="warn" appearance="outline" style="width: 100%;">
                <mat-label>UserName: </mat-label>
                <input matInput type="text" [(ngModel)]="registerUserData.username" name="username" required>
              </mat-form-field>
            </p>
              <p>
                <mat-form-field color="warn" appearance="outline" style="width: 100%;">
                  <mat-label>Password: </mat-label>
                  <input matInput type="password" [(ngModel)] = "registerUserData.password" name="password" required>
                </mat-form-field>
              </p>
              <button mat-raised-button color="warn" class="float-end" (click)="registerUser()">Register</button>

          </div>
        </form>
      </div>

    </div>
  </div>
</div>
