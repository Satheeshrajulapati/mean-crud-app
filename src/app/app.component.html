<mat-toolbar color="primary" class="RSK-Header">
  <mat-toolbar-row>
    <button mat-icon-button>
      <mat-icon>menu</mat-icon>
    </button>
    <h1>RSK eCommerce</h1>
    <div class="col-md-7 justify-content-start">
      <a mat-button [routerLink]="'/home'">Home</a>
      <a mat-button [routerLink]="'/contactUs'">Contact Us</a>
      <a mat-button [routerLink]="'/products'">Products</a>
    </div>
    <span calss="menu-spacer"></span>
    <div class="col-md-5 justify-content-end">
      <a mat-button [routerLink]="'/login'">Login</a>
      <a mat-button [routerLink]="'/logout'">LogOut</a>
      <a mat-button [routerLink]="'/register'">Register</a>
      <a mat-button  [matMenuTriggerFor]="userMenu">User</a>
      <mat-menu #userMenu >
        <a mat-menu-item>Profile</a>
        <a mat-menu-item>Orders</a>
        <a mat-menu-item>Logout</a>
      </mat-menu>

    <button mat-button [routerLink]="'/cart'">
      <span matBadge="7"
      matBadgeOverlap="false"
      matBadgePosition="above after"
      matBadgeColor="warn">
        <mat-icon>add_shopping_cart</mat-icon>
      </span>
    </button>
  </div>
  </mat-toolbar-row>
</mat-toolbar>


<router-outlet></router-outlet>
